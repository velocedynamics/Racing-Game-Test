<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Veloce Dynamics | STEM Grand Prix</title>
  <link rel="icon" type="image/png" href="images/Veloce Dynamics Logo no background.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0"/>
  <style>
    :root {
      --bg: #020617;
      --accent1: #22d3ee;
      --accent2: #6366f1;
      --accent3: #a855f7;
      --text: #f9fafb;
      --muted: #9ca3af;
      --border: rgba(148, 163, 184, 0.35);
      --radius-lg: 18px;
      --radius-full: 999px;
      --shadow-soft: 0 18px 40px rgba(15, 23, 42, 0.9);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at top, rgba(99, 102, 241, 0.18), transparent 55%), radial-gradient(circle at bottom, #020617 0, #000000 60%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
      padding: 1rem;
    }

    body::before {
      content: ""; position: absolute; inset: -200px;
      background: radial-gradient(circle at 20% 0%, rgba(34, 211, 238, 0.18), transparent 55%), radial-gradient(circle at 80% 100%, rgba(168, 85, 247, 0.22), transparent 55%);
      opacity: 0.4; mix-blend-mode: screen; pointer-events: none; z-index: -1;
    }

    .game-wrapper {
      background: radial-gradient(circle at top, rgba(15, 23, 42, 0.9), #020617);
      border-radius: var(--radius-lg); 
      border: 1px solid var(--border);
      padding: 1.5rem; 
      box-shadow: var(--shadow-soft);
      text-align: center;
      max-width: 500px;
      width: 100%;
    }

    .logo { width: 80px; margin: 0 auto 0.5rem auto; display: block; }

    h1 {
      font-size: 1.8rem; margin-bottom: 0.2rem;
      background: linear-gradient(90deg, var(--accent1), var(--accent2), var(--accent3));
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }

    p { color: var(--muted); margin-bottom: 1rem; font-size: 0.9rem; }

    #gameCanvas {
      background-color: #1e293b;
      border: 2px solid #475569;
      border-radius: 8px;
      box-shadow: inset 0 0 30px rgba(0,0,0,0.9);
      display: block;
      margin: 0 auto;
      max-width: 100%;
      height: auto;
      touch-action: none;
      cursor: pointer;
    }

    .controls-hint {
      margin-top: 1rem;
      font-size: 0.85rem;
      color: var(--accent1);
      display: flex;
      justify-content: center;
      gap: 15px;
    }

    .btn-secondary {
      border-radius: var(--radius-full); padding: 0.55rem 1.3rem; font-size: 0.85rem;
      background: transparent; color: var(--text); border: 1px solid rgba(148, 163, 184, 0.8);
      cursor: pointer; text-transform: uppercase; letter-spacing: 0.12em; text-decoration: none;
      margin-top: 1rem; display: inline-block; transition: all 0.2s;
    }
    
    .btn-secondary:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-2px); }
  </style>
</head>
<body>

  <div class="game-wrapper">
    <img src="images/Veloce Dynamics Logo no background.png" alt="Veloce Dynamics Logo" class="logo">
    
    <h1>STEM Grand Prix</h1>
    <p>Wait for Lights Out! Steer to overtake and win the race!</p>

    <canvas id="gameCanvas" width="320" height="480"></canvas>

    <div class="controls-hint">
      <span>💻 <b>PC:</b> Left/Right Arrows</span>
      <span>📱 <b>Mobile:</b> Tap Left/Right side</span>
    </div>

    <a href="index.html" class="btn-secondary">← Back to Website</a>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Load Player's Car Image
    const playerImg = new Image();
    playerImg.src = 'images/V3VC Aq-Photoroom.png'; // CHANGE THIS if you want to use the Photoroom cutout instead!

    // Game States: 'menu', 'grid', 'lights', 'racing', 'finished'
    let gameState = 'menu'; 
    let frames = 0;
    
    // INCREASED DIFFICULTY: Longer Race
    const raceDistance = 25000; 
    let trackOffset = 0; 
    let finalPosition = 1; // FIX: Locks in your place when you finish
    
    // F1 Lights
    let lightsPhase = 0; 
    let lightsOutDelay = 0;

    // Veloce Dynamics STEM Car (Player)
    let player = {
      w: 40, h: 80, // Slightly wider to fit the image well
      x: 0, y: 360,
      speed: 0, maxSpeed: 16.6, accel: 0.15,
      dx: 0, handling: 6.5,
      distance: 0 
    };

    // 3 Rival Cars (INCREASED DIFFICULTY)
    let enemies = [];
    
    function initGrid() {
      player.x = 80;
      player.distance = 0;
      player.speed = 0;
      player.dx = 0;
      finalPosition = 1; // Reset locked position

      // Rivals are now faster and accelerate quicker
      enemies = [
        { name: 'Green', w: 34, h: 70, x: 200, y: 0, speed: 0, maxSpeed: 15.8, accel: 0.13, distance: 250, color: '#10b981' },
        { name: 'Silver', w: 34, h: 70, x: 140, y: 0, speed: 0, maxSpeed: 16.2, accel: 0.14, distance: 500, color: '#cbd5e1' },
        { name: 'Red', w: 34, h: 70, x: 200, y: 0, speed: 0, maxSpeed: 16.5, accel: 0.16, distance: 750, color: '#ef4444' } // Red is almost as fast as you!
      ];

      lightsPhase = 0;
      frames = 0;
      gameState = 'lights';
      lightsOutDelay = Math.floor(Math.random() * 90) + 30; 
    }

    // --- INPUT HANDLING ---
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft' || e.key === 'a') player.dx = -player.handling;
      if (e.key === 'ArrowRight' || e.key === 'd') player.dx = player.handling;
      if (e.key === ' ' && (gameState === 'menu' || gameState === 'finished')) initGrid();
    });

    document.addEventListener('keyup', (e) => {
      if (e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === 'a' || e.key === 'd') player.dx = 0;
    });

    canvas.addEventListener('mousedown', handleTouchStart);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleTouchStart(e.touches[0]); }, {passive: false});
    canvas.addEventListener('mouseup', stopMovement);
    canvas.addEventListener('touchend', stopMovement);

    function handleTouchStart(e) {
      if (gameState === 'menu' || gameState === 'finished') { initGrid(); return; }
      const rect = canvas.getBoundingClientRect();
      const clickX = e.clientX - rect.left;
      player.dx = clickX < canvas.width / 2 ? -player.handling : player.handling;
    }
    function stopMovement() { player.dx = 0; }

    // --- DRAWING FUNCTIONS ---
    function drawSTEMCar(x, y, w, h, color) {
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(x, y + 12, 6, 16);
      ctx.fillRect(x + w - 6, y + 12, 6, 16);
      ctx.fillRect(x, y + h - 22, 6, 16);
      ctx.fillRect(x + w - 6, y + h - 22, 6, 16);

      ctx.fillStyle = color;
      ctx.fillRect(x + 2, y + 2, w - 4, 6);
      ctx.fillRect(x + 4, y + h - 8, w - 8, 8);

      ctx.beginPath();
      ctx.moveTo(x + 10, y + 8);
      ctx.lineTo(x + w - 10, y + 8);
      ctx.lineTo(x + w - 6, y + h - 10);
      ctx.lineTo(x + 6, y + h - 10);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = '#020617';
      ctx.beginPath();
      ctx.roundRect(x + 12, y + 28, w - 24, 16, 4);
      ctx.fill();

      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.fillRect(x + w/2 - 1, y + 48, 2, 12);
    }

    function drawLights() {
      if (lightsPhase === 6) return; 
      const boxW = 200, boxH = 50;
      const boxX = canvas.width/2 - boxW/2;
      const boxY = 40;

      ctx.fillStyle = '#0f172a';
      ctx.beginPath();
      ctx.roundRect(boxX, boxY, boxW, boxH, 8);
      ctx.fill();
      ctx.strokeStyle = '#334155';
      ctx.lineWidth = 2;
      ctx.stroke();

      for(let i=0; i<5; i++) {
        ctx.beginPath();
        ctx.arc(boxX + 20 + (i * 40), boxY + 25, 12, 0, Math.PI*2);
        if (i < lightsPhase) {
          ctx.fillStyle = '#ef4444'; 
          ctx.fill();
          ctx.shadowBlur = 10;
          ctx.shadowColor = '#ef4444';
        } else {
          ctx.fillStyle = '#1e293b'; 
          ctx.fill();
        }
        ctx.shadowBlur = 0;
      }
    }

    function drawCheckerboard(yPos) {
      const sq = 20;
      for (let x = 0; x < canvas.width; x += sq) {
        for (let y = 0; y < 40; y += sq) {
          ctx.fillStyle = ((x/sq + y/sq) % 2 === 0) ? '#fff' : '#000';
          ctx.fillRect(x, yPos + y, sq, sq);
        }
      }
    }

    // --- MAIN GAME LOOP ---
    function update() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      frames++;

      // 1. LIGHTS SEQUENCE
      if (gameState === 'lights') {
        if (frames % 40 === 0 && lightsPhase < 5) lightsPhase++;
        if (lightsPhase === 5) {
          lightsOutDelay--;
          if (lightsOutDelay <= 0) {
            lightsPhase = 6; 
            gameState = 'racing';
          }
        }
      }

      // 2. RACING LOGIC
      if (gameState === 'racing') {
        if (player.speed < player.maxSpeed) player.speed += player.accel;
        
        player.x += player.dx;
        if (player.x < 10) player.x = 10;
        if (player.x + player.w > canvas.width - 10) player.x = canvas.width - player.w - 10;
        
        player.distance += player.speed;

        trackOffset += player.speed;
        if (trackOffset > 100) trackOffset -= 100;

        // BUG FIX: Lock the position exactly when the player finishes!
        if (player.distance >= raceDistance) {
          gameState = 'finished';
          finalPosition = 1;
          enemies.forEach(e => { if (e.distance > player.distance) finalPosition++; });
        }
      }

      // Draw Road Lines
      ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
      for(let i = -100; i < canvas.height + 100; i+= 100) {
        ctx.fillRect(canvas.width/3 - 2, i + trackOffset, 4, 40);
        ctx.fillRect((canvas.width/3)*2 - 2, i + trackOffset, 4, 40);
      }

      // Draw Start & Finish Lines
      let startLineY = player.y - (0 - player.distance) + player.h + 20;
      if (startLineY < canvas.height && startLineY > -100) {
        drawCheckerboard(startLineY);
      }

      let finishLineY = player.y - (raceDistance - player.distance);
      if (finishLineY < canvas.height && finishLineY > -100) {
        drawCheckerboard(finishLineY);
      }

      // 3. RIVAL CAR LOGIC
      for (let i = 0; i < enemies.length; i++) {
        let e = enemies[i];
        
        if (gameState === 'racing' || gameState === 'finished') {
          if (e.speed < e.maxSpeed) e.speed += e.accel;
          e.distance += e.speed;

          // INCREASED DIFFICULTY: Enemies block you much faster now
          if (e.distance > player.distance + 40 && e.distance < player.distance + 400) {
            if (e.x + e.w/2 < player.x + player.w/2 - 2) e.x += 0.6; // Was 0.3
            else if (e.x + e.w/2 > player.x + player.w/2 + 2) e.x -= 0.6; // Was 0.3
          }
        }

        e.y = player.y - (e.distance - player.distance);

        if (e.y > -100 && e.y < canvas.height + 100) {
          drawSTEMCar(e.x, e.y, e.w, e.h, e.color);
        }

        // Collision Detection
        if (gameState === 'racing') {
          const m = 4; 
          if (player.x + m < e.x + e.w - m && player.x + player.w - m > e.x + m &&
              player.y + m < e.y + e.h - m && player.h + player.y - m > e.y + m) {
            // INCREASED DIFFICULTY: Hitting an enemy hurts your speed more
            player.speed *= 0.5; 
            e.distance += 10; 
          }
        }
      }

      // DRAW PLAYER CAR (Now using your real photo!)
      if (playerImg.complete) {
        // Rotates the image if necessary, but assuming your image faces up:
        ctx.drawImage(playerImg, player.x, player.y, player.w, player.h);
      } else {
        // Fallback drawing while image loads
        drawSTEMCar(player.x, player.y, player.w, player.h, player.color);
      }

      if (gameState === 'lights') drawLights();

      // UI Text
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 16px sans-serif';
      
      // Calculate display position
      let currentPos = 1;
      if (gameState === 'finished') {
        currentPos = finalPosition; // Use the locked position!
      } else {
        enemies.forEach(e => { if (e.distance > player.distance) currentPos++; });
      }
      
      let suffix = "th";
      if (currentPos === 1) suffix = "st";
      if (currentPos === 2) suffix = "nd";
      if (currentPos === 3) suffix = "rd";

      ctx.fillText(`Pos: ${currentPos}${suffix} / 4`, 10, 25);
      
      let distanceLeft = Math.max(0, Math.floor((raceDistance - player.distance) / 10));
      ctx.textAlign = 'right';
      ctx.fillText(`Dist: ${distanceLeft}m`, canvas.width - 10, 25);
      ctx.textAlign = 'left';

      if (gameState === 'menu') drawStartScreen();
      if (gameState === 'finished') drawGameOver(currentPos, suffix);

      requestAnimationFrame(update);
    }

    function drawStartScreen() {
      ctx.fillStyle = 'rgba(15, 23, 42, 0.9)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#22d3ee';
      ctx.font = 'bold 24px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('VELOCE DYNAMICS', canvas.width/2, canvas.height/2 - 20);
      ctx.fillStyle = '#fff';
      ctx.font = '16px sans-serif';
      ctx.fillText('Tap or Spacebar to Race', canvas.width/2, canvas.height/2 + 20);
      ctx.textAlign = 'left';
    }

    function drawGameOver(pos, suffix) {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      ctx.textAlign = 'center';
      if (pos === 1) {
        ctx.fillStyle = '#fbbf24';
        ctx.font = 'bold 30px sans-serif';
        ctx.fillText('🏆 YOU WON! 🏆', canvas.width/2, canvas.height/2 - 30);
      } else {
        ctx.fillStyle = '#ef4444';
        ctx.font = 'bold 30px sans-serif';
        ctx.fillText('RACE OVER', canvas.width/2, canvas.height/2 - 30);
      }
      
      ctx.fillStyle = '#fff';
      ctx.font = '20px sans-serif';
      ctx.fillText(`Finished: ${pos}${suffix} Place`, canvas.width/2, canvas.height/2 + 10);
      
      ctx.fillStyle = '#22d3ee';
      ctx.font = '16px sans-serif';
      ctx.fillText('Tap or Spacebar to Retry', canvas.width/2, canvas.height/2 + 60);
      ctx.textAlign = 'left';
    }

    // Start loop
    requestAnimationFrame(update);
  </script>
</body>
</html>
