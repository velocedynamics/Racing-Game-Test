<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Veloce Dynamics | STEM Grand Prix</title>
  <link rel="icon" type="image/png" href="images/Veloce Dynamics Logo no background.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0"/>
  <style>
    :root {
      --bg: #020617;
      --accent1: #22d3ee; /* ICE BLUE */
      --accent2: #6366f1;
      --accent3: #a855f7;
      --text: #f9fafb;
      --muted: #9ca3af;
      --border: rgba(148, 163, 184, 0.35);
      --radius-lg: 18px;
      --radius-full: 999px;
      --shadow-soft: 0 18px 40px rgba(15, 23, 42, 0.9);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at top, rgba(99, 102, 241, 0.18), transparent 55%), radial-gradient(circle at bottom, #020617 0, #000000 60%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
      padding: 1rem;
    }

    body::before {
      content: ""; position: absolute; inset: -200px;
      background: radial-gradient(circle at 20% 0%, rgba(34, 211, 238, 0.18), transparent 55%), radial-gradient(circle at 80% 100%, rgba(168, 85, 247, 0.22), transparent 55%);
      opacity: 0.4; mix-blend-mode: screen; pointer-events: none; z-index: -1;
    }

    .game-wrapper {
      background: radial-gradient(circle at top, rgba(15, 23, 42, 0.9), #020617);
      border-radius: var(--radius-lg); 
      border: 1px solid var(--border);
      padding: 2rem; 
      box-shadow: var(--shadow-soft);
      text-align: center;
      max-width: 500px;
      width: 100%;
    }

    .logo { width: 90px; margin: 0 auto 1rem auto; display: block; }

    h1 {
      font-size: 2rem; margin-bottom: 0.2rem;
      background: linear-gradient(90deg, var(--accent1), var(--accent2), var(--accent3));
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }

    p { color: var(--muted); margin-bottom: 1.5rem; font-size: 0.95rem; }

    #gameCanvas {
      background-color: #1e293b;
      border: 2px solid #475569;
      border-radius: 8px;
      box-shadow: inset 0 0 30px rgba(0,0,0,0.9);
      display: block;
      margin: 0 auto;
      max-width: 100%;
      height: auto;
      touch-action: none;
      cursor: pointer;
    }

    .controls-hint {
      margin-top: 1rem;
      font-size: 0.85rem;
      color: var(--accent1);
      display: flex;
      justify-content: center;
      gap: 15px;
    }

    .btn-secondary {
      border-radius: var(--radius-full); padding: 0.55rem 1.3rem; font-size: 0.85rem;
      background: transparent; color: var(--text); border: 1px solid rgba(148, 163, 184, 0.8);
      cursor: pointer; text-transform: uppercase; letter-spacing: 0.12em; text-decoration: none;
      margin-top: 1.5rem; display: inline-block; transition: all 0.2s;
    }
    
    .btn-secondary:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-2px); }
  </style>
</head>
<body>

  <div class="game-wrapper">
    <img src="images/Veloce Dynamics Logo no background.png" alt="Veloce Dynamics Logo" class="logo">
    
    <h1>STEM Grand Prix</h1>
    <p>Overtake your rivals and fight for the podium!</p>

    <canvas id="gameCanvas" width="320" height="480"></canvas>

    <div class="controls-hint">
      <span>💻 <b>PC:</b> Left/Right Arrows</span>
      <span>📱 <b>Mobile:</b> Tap Left/Right side</span>
    </div>

    <a href="index.html" class="btn-secondary">← Back to Website</a>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Game Variables
    let gameState = 'start'; 
    let score = 0; // Cars passed
    let highscore = localStorage.getItem('veloceGrandPrixBest') || 0;
    let baseSpeed = 12; // MUCH faster starting speed
    let frames = 0;

    const laneCount = 3;
    const laneWidth = canvas.width / laneCount;
    let roadLines = [];

    // Veloce Dynamics STEM Car
    const player = {
      w: 34,
      h: 70,
      x: canvas.width / 2 - 17,
      y: canvas.height - 100,
      speed: 6.5, // Faster steering
      dx: 0,
      color: '#22d3ee' // Ice Blue
    };

    // Rival Cars
    let enemies = [];
    // F1 Colors: Ferrari Red, Mercedes Silver, Aston Green, RedBull Navy
    const enemyColors = ['#ef4444', '#cbd5e1', '#10b981', '#1e3a8a']; 

    // --- INPUT HANDLING ---
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft' || e.key === 'a') player.dx = -player.speed;
      if (e.key === 'ArrowRight' || e.key === 'd') player.dx = player.speed;
      if (e.key === ' ' && gameState !== 'playing') resetGame();
    });

    document.addEventListener('keyup', (e) => {
      if (e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === 'a' || e.key === 'd') player.dx = 0;
    });

    canvas.addEventListener('mousedown', handleTouchStart);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleTouchStart(e.touches[0]); }, {passive: false});
    canvas.addEventListener('mouseup', stopMovement);
    canvas.addEventListener('touchend', stopMovement);

    function handleTouchStart(e) {
      if (gameState !== 'playing') { resetGame(); return; }
      const rect = canvas.getBoundingClientRect();
      const clickX = e.clientX - rect.left;
      player.dx = clickX < canvas.width / 2 ? -player.speed : player.speed;
    }
    function stopMovement() { player.dx = 0; }

    // --- GAME LOGIC ---
    function resetGame() {
      player.x = canvas.width / 2 - player.w / 2;
      player.dx = 0;
      enemies = [];
      roadLines = [];
      score = 0;
      baseSpeed = 12; // Reset to high speed
      frames = 0;
      
      for(let i=0; i<6; i++) { roadLines.push({y: i * 100}); }
      gameState = 'playing';
      update();
    }

    function spawnEnemy() {
      const lane = Math.floor(Math.random() * laneCount);
      const enemyX = (lane * laneWidth) + (laneWidth / 2) - (player.w / 2);
      
      // Determine if car is slower (you overtake) or faster (it overtakes you)
      const isFaster = Math.random() > 0.8; // 20% chance an enemy overtakes YOU from behind
      
      const enemySpeed = isFaster ? baseSpeed + (Math.random() * 3 + 2) : baseSpeed - (Math.random() * 4 + 2);
      const startY = isFaster ? canvas.height + 50 : -80;

      enemies.push({
        x: enemyX,
        y: startY,
        w: 34,
        h: 70,
        speed: enemySpeed,
        color: enemyColors[Math.floor(Math.random() * enemyColors.length)],
        passed: false
      });
    }

    // DRAW F1/STEM CAR
    function drawSTEMCar(x, y, w, h, color) {
      // 1. Tires (Exposed Black rectangles)
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(x, y + 12, 6, 16); // Top Left
      ctx.fillRect(x + w - 6, y + 12, 6, 16); // Top Right
      ctx.fillRect(x, y + h - 22, 6, 16); // Bottom Left
      ctx.fillRect(x + w - 6, y + h - 22, 6, 16); // Bottom Right

      // 2. Front Wing
      ctx.fillStyle = color;
      ctx.fillRect(x + 2, y + 2, w - 4, 6);

      // 3. Rear Wing
      ctx.fillRect(x + 4, y + h - 8, w - 8, 8);

      // 4. Aerodynamic Chassis (Narrower in middle)
      ctx.beginPath();
      ctx.moveTo(x + 10, y + 8); // Nose
      ctx.lineTo(x + w - 10, y + 8);
      ctx.lineTo(x + w - 6, y + h - 10); // Sidepods wide
      ctx.lineTo(x + 6, y + h - 10);
      ctx.closePath();
      ctx.fill();

      // 5. Cockpit / Halo
      ctx.fillStyle = '#020617';
      ctx.beginPath();
      ctx.roundRect(x + 12, y + 28, w - 24, 16, 4);
      ctx.fill();

      // 6. Highlight/Decal down the middle
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.fillRect(x + w/2 - 1, y + 48, 2, 12);
    }

    function update() {
      if (gameState !== 'playing') return;

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      frames++;

      // Increase speed slightly over time to make it harder
      if (frames % 300 === 0) baseSpeed += 0.5;

      player.x += player.dx;
      if (player.x < 0) player.x = 0;
      if (player.x + player.w > canvas.width) player.x = canvas.width - player.w;

      // Draw fast moving road
      ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
      roadLines.forEach((line) => {
        line.y += baseSpeed;
        if (line.y > canvas.height) line.y = -50;
        for(let l = 1; l < laneCount; l++) {
          ctx.fillRect(l * laneWidth - 2, line.y, 4, 40); // Longer dashes for speed illusion
        }
      });

      // Spawn Rivals
      if (frames % Math.max(20, 45 - Math.floor(baseSpeed)) === 0) {
        spawnEnemy();
      }

      for (let i = 0; i < enemies.length; i++) {
        let e = enemies[i];
        
        // Relative speed: If player base speed is 12 and enemy is 10, enemy moves DOWN by 2.
        // If enemy speed is 15, enemy moves UP by 3 (overtaking you).
        e.y += (baseSpeed - e.speed); 

        drawSTEMCar(e.x, e.y, e.w, e.h, e.color);

        // Check Overtakes for Score
        if (!e.passed && e.y > player.y + player.h) {
          e.passed = true;
          score++; // +1 for every rival left behind!
        }

        // Collision Detection (Tighter hitbox for the narrow F1 body)
        const hitboxMargin = 6;
        if (
          player.x + hitboxMargin < e.x + e.w - hitboxMargin &&
          player.x + player.w - hitboxMargin > e.x + hitboxMargin &&
          player.y + hitboxMargin < e.y + e.h - hitboxMargin &&
          player.h + player.y - hitboxMargin > e.y + hitboxMargin
        ) {
          gameState = 'gameover';
          if (score > highscore) {
            highscore = score;
            localStorage.setItem('veloceGrandPrixBest', highscore);
          }
        }

        // Remove off-screen cars
        if (e.y > canvas.height + 150 || e.y < -150) {
          enemies.splice(i, 1);
          i--;
        }
      }

      // Draw Veloce Dynamics Player Car
      drawSTEMCar(player.x, player.y, player.w, player.h, player.color);

      // UI
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 16px sans-serif';
      ctx.fillText(`Overtakes: ${score}`, 10, 25);
      ctx.fillText(`Best: ${highscore}`, canvas.width - 80, 25);

      requestAnimationFrame(update);
      if(gameState === 'gameover') drawGameOver();
    }

    function drawStartScreen() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'rgba(15, 23, 42, 0.9)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      ctx.fillStyle = '#22d3ee';
      ctx.font = 'bold 24px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('VELOCE DYNAMICS', canvas.width/2, canvas.height/2 - 20);
      
      ctx.fillStyle = '#fff';
      ctx.font = '16px sans-serif';
      ctx.fillText('Tap or Spacebar to Race', canvas.width/2, canvas.height/2 + 20);
    }

    function drawGameOver() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      ctx.fillStyle = '#ef4444';
      ctx.font = 'bold 30px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('CRASHED!', canvas.width/2, canvas.height/2 - 30);
      
      ctx.fillStyle = '#fff';
      ctx.font = '20px sans-serif';
      ctx.fillText(`Rivals Passed: ${score}`, canvas.width/2, canvas.height/2 + 10);
      
      ctx.fillStyle = '#22d3ee';
      ctx.font = '16px sans-serif';
      ctx.fillText('Tap or Spacebar to Retry', canvas.width/2, canvas.height/2 + 50);
    }

    drawStartScreen();
  </script>
</body>
</html>
